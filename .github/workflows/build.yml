name: build

on:
  push:
    branches:
      - cluster
      - master
    paths:
      - '**.go'
      - '**/Dockerfile'
      - '**/Makefile'
      - '!app/vmui/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches:
      - cluster
      - master
    paths:
      - '**.go'
      - '**/Dockerfile'
      - '**/Makefile'
      - '!app/vmui/**'
      - '.github/workflows/build.yml'

permissions: {}

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

jobs:
  build:
    name: ${{ matrix.os }}-${{ matrix.arch }}
    permissions:
      contents: read
    # Runs on dedicated runner with extra resources to increase build speed.
    runs-on: 'vm-runner'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: 386
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: linux
            arch: arm
          - os: linux
            arch: ppc64le
          - os: linux
            arch: s390x
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: freebsd
            arch: amd64
          - os: openbsd
            arch: amd64
          - os: netbsd
            arch: amd64
          - os: windows
            arch: amd64
    steps:
      - name: Code checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        id: go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          cache-dependency-path: |
            go.sum
            Makefile
            app/**/Makefile
          go-version-file: 'go.mod'
      - run: go version

      - name: Build victoria-metrics for ${{ matrix.os }}-${{ matrix.arch }}
        run: make victoria-metrics-${{ matrix.os }}-${{ matrix.arch }}

      - name: Build vmutils for ${{ matrix.os }}-${{ matrix.arch }}
        run: make vmutils-${{ matrix.os }}-${{ matrix.arch }}
