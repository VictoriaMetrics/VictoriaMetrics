name: test

on:
  push:
    branches:
      - cluster
      - master
    paths:
      - '**.go'
      - 'go.*'
      - '.github/workflows/main.yml'
  pull_request:
    branches:
      - cluster
      - master
    paths:
      - '**.go'
      - 'go.*'
      - '.github/workflows/main.yml'

permissions:
  contents: read

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}


jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Go
        id: go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          cache-dependency-path: |
            go.sum
            Makefile
            app/**/Makefile
          go-version-file: 'go.mod'

      - run: go version

      - name: Cache golangci-lint
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cache/golangci-lint
            ~/go/bin
          key: golangci-lint-${{ runner.os }}-${{ steps.go.outputs.go-version }}-${{ hashFiles('.golangci.yml') }}

      - name: Run check-all
        run: |
          make check-all
          git diff --exit-code

  unit:
    name: unit
    runs-on: ubuntu-latest

    strategy:
      matrix:
        scenario:
          - 'test'
          - 'test-386'
          - 'test-pure'

    steps:
      - name: Code checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Go
        id: go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          cache-dependency-path: |
            go.sum
            Makefile
            app/**/Makefile
          go-version-file: 'go.mod'
      - run: go version

      - name: Run tests
        run: make ${{ matrix.scenario}}

  apptest:
    name: apptest
    runs-on: apptest

    steps:
      - name: Code checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Go
        id: go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          cache-dependency-path: |
            go.sum
            Makefile
            app/**/Makefile
          go-version-file: 'go.mod'
      - run: go version

      - name: Run app tests
        run: make apptest
